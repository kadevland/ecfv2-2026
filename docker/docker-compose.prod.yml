# Docker Compose Production Override - Cinéphoria ECF
# Configuration optimisée pour la production
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up

services:
  # Application production avec optimisations
  app:
    build:
      target: production
    ports:
      - "${APP_PORT:-80}:8000"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - LOG_LEVEL=error
    volumes:
      - ../:/app
      - ./services/frankenphp/Caddyfile.prod:/etc/caddy/Caddyfile
      - ./services/frankenphp/php-prod.ini:/usr/local/etc/php/conf.d/99-config.ini
      # Caches pour production (accélère les déploiements)
      - composer_cache:/app/vendor
      - composer_cache:/root/.composer
    command: sh -c "composer install --no-dev --optimize-autoloader && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan octane:frankenphp --host=0.0.0.0 --port=8000"

  # PostgreSQL avec configuration production
  postgres:
    environment:
      # Production database settings
      - POSTGRES_SHARED_PRELOAD_LIBRARIES=pg_stat_statements
    volumes:
      - postgresql_prod_data:/var/lib/postgresql/data/pgdata

  # MongoDB avec configuration production  
  mongodb:
    environment:
      # Production MongoDB settings
      - MONGODB_EXTRA_FLAGS=--wiredTigerCacheSizeGB=1
    volumes:
      - mongodb_prod_data:/data/db

  # Redis avec configuration production
  redis:
    environment:
      - REDIS_MAXMEMORY=256mb
      - REDIS_MAXMEMORY_POLICY=allkeys-lru
    volumes:
      - redis_prod_data:/data

  # Pas d'outils de développement en production
  # mailpit, pgadmin, mongo-express, redis-commander désactivés

volumes:
  postgresql_prod_data:
    driver: local
  mongodb_prod_data:
    driver: local
  redis_prod_data:
    driver: local
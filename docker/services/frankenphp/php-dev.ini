; Configuration PHP pour développement ECF Cinéphoria
; Xdebug + optimisations pour FrankenPHP + Laravel Octane

[PHP]
; Configuration générale développement
memory_limit = 512M
max_execution_time = 120
post_max_size = 50M
upload_max_filesize = 50M
max_file_uploads = 20

; Logs détaillés pour debug
log_errors = On
error_log = /dev/stderr
error_reporting = E_ALL
display_errors = On
display_startup_errors = On

; Session optimisée pour Redis
session.save_handler = redis
session.save_path = "tcp://redis:6379"
session.gc_maxlifetime = 1440

; OPcache désactivé en dev pour voir les changements
opcache.enable = 0
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0

[Date]
date.timezone = Europe/Paris

; === XDEBUG CONFIGURATION ===
[xdebug]
zend_extension = xdebug.so
xdebug.mode = develop,debug,coverage
xdebug.start_with_request = yes
xdebug.client_host = host.docker.internal
xdebug.client_port = 9003
xdebug.idekey = PHPSTORM
xdebug.log = /dev/stderr
xdebug.log_level = 0

; === LARAVEL OCTANE + FRANKENPHP ===
; Désactiver les fonctions interdites avec Octane
disable_functions = ""

; Optimisations mémoire pour worker mode
memory_get_usage = 1
memory_get_peak_usage = 1

; Réduction des timeouts pour développement
max_input_time = 60
default_socket_timeout = 60
; Configuration PHP pour production ECF Cinéphoria
; Optimisations maximales pour FrankenPHP + Laravel Octane

[PHP]
; Configuration générale production
memory_limit = 256M
max_execution_time = 30
post_max_size = 20M
upload_max_filesize = 20M
max_file_uploads = 10

; Logs minimaux pour performance
log_errors = On
error_log = /dev/stderr
error_reporting = E_ERROR | E_WARNING | E_PARSE
display_errors = Off
display_startup_errors = Off

; Session optimisée pour Redis
session.save_handler = redis
session.save_path = "tcp://redis:6379"
session.gc_maxlifetime = 1440
session.cache_limiter = nocache

; === OPCACHE OPTIMISÉ PRODUCTION ===
[opcache]
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 32
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 0
opcache.save_comments = 0
opcache.fast_shutdown = 1
opcache.enable_file_override = 1

; Optimisations spéciales pour FrankenPHP worker mode
opcache.optimization_level = 0x7FFEBFFF
opcache.preload = /app/config/opcache-preload.php

[Date]
date.timezone = Europe/Paris

; === LARAVEL OCTANE + FRANKENPHP PRODUCTION ===
; Désactiver les fonctions potentiellement dangereuses
disable_functions = exec,passthru,shell_exec,system,proc_open,popen

; Optimisations mémoire pour haute performance
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; Timeouts optimisés pour production
max_input_time = 30
default_socket_timeout = 30

; Pas de Xdebug en production
; xdebug désactivé automatiquement
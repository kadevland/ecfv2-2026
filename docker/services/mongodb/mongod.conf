# MongoDB Configuration for Cinéphoria ECF  
# Configuration simple pour MongoDB 8.0 + replica set (dev)

# Network interfaces
net:
  port: 27017
  bindIp: 0.0.0.0

# Storage
storage:
  dbPath: /data/db
  wiredTiger:
    engineConfig:
      cacheSizeGB: 0.5

# Logging (simplified for container)
systemLog:
  destination: file
  logAppend: true
  path: /var/log/mongodb/mongod.log

# Replica Set (requis pour transactions)
replication:
  replSetName: rs0

# Security disabled for dev environment
# (In production, use keyFile authentication)
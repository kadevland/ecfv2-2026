services:
  # === OUTILS DE DÉVELOPPEMENT ECF ===

  pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: ${PGADMIN_CONTAINER_NAME:-ecf.pgadmin}
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@ecf.fr}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-adminpass}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "${PGADMIN_PORT:-8080}:80"
    networks:
      - ecf_network

  mongo-express:
    image: mongo-express:1.0.2-20
    container_name: ${MONGO_EXPRESS_CONTAINER_NAME:-ecf.mongo-express}
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_SERVER: ${MONGO_HOST:-mongodb}
      ME_CONFIG_MONGODB_PORT: ${MONGO_PORT:-27017}
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USERNAME:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-adminpass}
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    networks:
      - ecf_network
    depends_on:
      - mongodb

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: ${REDIS_COMMANDER_CONTAINER_NAME:-ecf.redis-commander}
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "local:${REDIS_HOST:-redis}:${REDIS_PORT:-6379}:0:${REDIS_PASSWORD}"
      HTTP_USER: ${REDIS_COMMANDER_USERNAME:-admin}
      HTTP_PASSWORD: ${REDIS_COMMANDER_PASSWORD:-adminpass}
    ports:
      - "${REDIS_COMMANDER_PORT:-8082}:8081"
    networks:
      - ecf_network
    depends_on:
      - redis

  mailpit:
    image: axllent/mailpit:v1.23.2
    container_name: ${MAILPIT_CONTAINER_NAME:-ecf.mailpit}
    restart: unless-stopped
    ports:
      - "${MAILPIT_WEB_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    networks:
      - ecf_network
